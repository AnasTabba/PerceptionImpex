# Render Blueprint — static site deployment for Perception Impex.
# https://render.com/docs/static-sites
services:
  - type: web
    runtime: static
    name: perception-impex
    buildCommand: npm ci && npm run build
    staticPublishPath: ./out
    # Next.js static export emits index.html at root and a 404.html that
    # Render serves automatically for unknown routes.
    headers:
      # --- Security headers (apply to every response) ---
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), browsing-topics=()
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Content-Security-Policy
        value: >-
          default-src 'self'; base-uri 'self'; object-src 'none';
          frame-ancestors 'none'; img-src 'self' data:; font-src 'self';
          style-src 'self' 'unsafe-inline';
          script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com;
          frame-src https://challenges.cloudflare.com;
          connect-src 'self' https://formspree.io https://*.supabase.co
          https://challenges.cloudflare.com;
          form-action 'self' https://formspree.io; upgrade-insecure-requests
      # --- Caching ---
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /images/*
        name: Cache-Control
        value: public, max-age=2592000
