# Render Blueprint — static site deployment for Perception Impex.
# https://render.com/docs/static-sites
services:
  - type: web
    runtime: static
    name: perception-impex
    buildCommand: npm ci && npm run build
    staticPublishPath: ./out
    # Next.js static export emits index.html at root and a 404.html that
    # Render serves automatically for unknown routes.
    headers:
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /images/*
        name: Cache-Control
        value: public, max-age=2592000
